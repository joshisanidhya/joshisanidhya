<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508" />
      <stop offset="50%" stop-color="#09090d" />
      <stop offset="100%" stop-color="#0d0e15" />
    </linearGradient>

    <!-- Accent Red Glow Gradient -->
    <radialGradient id="red-glow" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2020" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ff2020" stop-opacity="0" />
    </radialGradient>

    <!-- Red Thread Gradient -->
    <linearGradient id="thread-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff2020" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#ff2020" stop-opacity="1" />
      <stop offset="100%" stop-color="#ff3333" stop-opacity="0.3" />
    </linearGradient>

    <!-- Tech Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ff2020" stroke-width="1" stroke-opacity="0.04" />
      <circle cx="30" cy="30" r="1" fill="#ff2020" fill-opacity="0.1" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-sans {
      font-family: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    }

    /* Animations */
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes rotate-slow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes rotate-rev {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes trace-line {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-6px) translateX(3px); }
    }

    .anim-pulse { animation: pulse 3s infinite ease-in-out; }
    .anim-cursor { animation: cursor-blink 0.9s infinite; }
    .anim-rotate-slow { transform-origin: 680px 150px; animation: rotate-slow 25s infinite linear; }
    .anim-rotate-rev { transform-origin: 680px 150px; animation: rotate-rev 15s infinite linear; }
    .anim-float { animation: float 6s infinite ease-in-out; }
  </style>

  <!-- Background Base -->
  <rect width="850" height="300" fill="url(#bg-grad)" />

  <!-- Ambient Glow -->
  <rect width="850" height="300" fill="url(#red-glow)" />

  <!-- Grid Overlay -->
  <rect width="850" height="300" fill="url(#grid)" />

  <!-- Tech Lines & Corners (HUD aesthetic) -->
  <g stroke="#ff2020" stroke-opacity="0.15" stroke-width="1">
    <!-- Top-left border details -->
    <path d="M 20,20 L 60,20 M 20,20 L 20,60" />
    <circle cx="20" cy="20" r="2" fill="#ff2020" />
    <path d="M 830,20 L 790,20 M 830,20 L 830,60" />
    <circle cx="830" cy="20" r="2" fill="#ff2020" />
    <path d="M 20,280 L 60,280 M 20,280 L 20,240" />
    <circle cx="20" cy="280" r="2" fill="#ff2020" />
    <path d="M 830,280 L 790,280 M 830,280 L 830,240" />
    <circle cx="830" cy="280" r="2" fill="#ff2020" />
    
    <!-- Horizon sub-lines -->
    <line x1="20" y1="45" x2="830" y2="45" stroke-dasharray="5,5" stroke-opacity="0.08" />
    <line x1="20" y1="255" x2="830" y2="255" stroke-dasharray="5,5" stroke-opacity="0.08" />
  </g>

  <!-- Animated HUD Elements (Right Side) -->
  <g class="anim-float">
    <!-- Outer Hexagon / Circle -->
    <circle cx="680" cy="150" r="75" fill="none" stroke="#ff2020" stroke-opacity="0.08" stroke-width="1" />
    
    <!-- Rotating Ring 1 -->
    <circle cx="680" cy="150" r="65" fill="none" stroke="#ff2020" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="100, 30, 40, 20" class="anim-rotate-slow" filter="url(#glow)" />
    
    <!-- Rotating Ring 2 (Reverse) -->
    <circle cx="680" cy="150" r="50" fill="none" stroke="#ff2020" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="10, 15, 45, 10" class="anim-rotate-rev" />
    
    <!-- Inside Details -->
    <circle cx="680" cy="150" r="8" fill="#ff2020" fill-opacity="0.3" filter="url(#glow-strong)" />
    <circle cx="680" cy="150" r="3" fill="#ffffff" />
    
    <!-- Crosshair lines -->
    <line x1="590" y1="150" x2="770" y2="150" stroke="#ff2020" stroke-opacity="0.1" stroke-width="1" />
    <line x1="680" y1="60" x2="680" y2="240" stroke="#ff2020" stroke-opacity="0.1" stroke-width="1" />
    
    <!-- Text HUD info -->
    <text x="680" y="245" text-anchor="middle" fill="#ff2020" fill-opacity="0.4" font-size="8" class="font-mono" letter-spacing="1">SYS_STATUS: ACTIVE</text>
    <text x="680" y="50" text-anchor="middle" fill="#ffffff" fill-opacity="0.6" font-size="8" class="font-mono" letter-spacing="2">COORD: [34.009, -118.243]</text>
  </g>

  <!-- Dynamic S-Curve line (representing scroll thread line from portfolio) -->
  <path d="M 400,280 C 450,220 500,240 550,150 C 600,60 620,100 680,150" fill="none" stroke="url(#thread-grad)" stroke-width="2" stroke-dasharray="1000" stroke-dashoffset="1000" filter="url(#glow)" style="animation: trace-line 8s infinite linear;" />

  <!-- Left Content (Text Info) -->
  
  <!-- System Status Badge -->
  <g transform="translate(45, 60)">
    <rect width="90" height="18" rx="3" fill="#ff2020" fill-opacity="0.1" stroke="#ff2020" stroke-opacity="0.3" stroke-width="1" />
    <circle cx="12" cy="9" r="3" fill="#ff2020" class="anim-pulse" filter="url(#glow)" />
    <text x="24" y="12" fill="#ff2020" font-size="9" font-weight="bold" class="font-mono" letter-spacing="1">SYS_ACTIVE</text>
  </g>
  
  <!-- Developer Name -->
  <text x="45" y="120" fill="#ffffff" font-size="44" font-weight="900" class="font-sans" letter-spacing="-1">
    SANIDHYA JOSHI
  </text>
  
  <!-- Subtitle Tagline -->
  <text x="45" y="150" fill="#ff2020" font-size="13" font-weight="700" class="font-mono" letter-spacing="1" filter="url(#glow)">
    &lt; Full Stack / Backend Developer / AI/ML Enthusiast &gt;
  </text>

  <!-- Custom Info Rows (Skills Overview) -->
  <g transform="translate(45, 185)">
    <!-- Row 1: Focus -->
    <text x="0" y="15" fill="#a1a1aa" font-size="12" class="font-mono">
      <tspan fill="#ff2020">✦</tspan> Focus: <tspan fill="#ffffff">High-Performance Web &amp; Distributed Systems</tspan>
    </text>
    
    <!-- Row 2: RAG / AI -->
    <text x="0" y="35" fill="#a1a1aa" font-size="12" class="font-mono">
      <tspan fill="#ff2020">✦</tspan> RAG Pipeline: <tspan fill="#ffffff">Document Intelligence (SAGE Platform)</tspan>
    </text>
    
    <!-- Row 3: Stack -->
    <text x="0" y="55" fill="#a1a1aa" font-size="12" class="font-mono">
      <tspan fill="#ff2020">✦</tspan> Stack: <tspan fill="#ffffff">React, Node.js, WebSockets, Python, LangChain, Docker</tspan>
    </text>
  </g>
</svg>
